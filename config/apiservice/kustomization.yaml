apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- apiservice.yaml
- service.yaml

# Imported by config/default which applies namePrefix: soteria-.
# The Service name "apiserver" becomes "soteria-apiserver" after prefix.
# The APIService name "v1alpha1.soteria.io" is fixed back via a
# replacement in config/default (namePrefix must not alter it).
