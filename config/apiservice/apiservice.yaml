apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.soteria.io
  annotations:
    cert-manager.io/inject-ca-from: $(NAMESPACE)/soteria-apiserver-cert
spec:
  group: soteria.io
  version: v1alpha1
  service:
    namespace: $(NAMESPACE)
    name: soteria-apiserver
  groupPriorityMinimum: 1000
  versionPriority: 100
  caBundle: "${CA_BUNDLE}"
