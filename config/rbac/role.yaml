---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - kubevirt.io
  resources:
  - virtualmachines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - soteria.io
  resources:
  - drplans
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - soteria.io
  resources:
  - drplans/status
  verbs:
  - get
  - patch
  - update
