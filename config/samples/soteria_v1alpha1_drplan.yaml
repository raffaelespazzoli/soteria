apiVersion: soteria.io/v1alpha1
kind: DRPlan
metadata:
  name: erp-full-stack
spec:
  # Wave label key used to group VMs into ordered waves for failover execution.
  waveLabel: soteria.io/wave
  # Maximum number of VMs that may fail over concurrently within a single wave.
  maxConcurrentFailovers: 4
# VMs are associated to this plan by setting the label:
#   soteria.io/drplan: erp-full-stack
# on each VirtualMachine resource. See vm_with_drplan_label.yaml for an example.
