# ScyllaCluster CR for a single-DC deployment (one per OpenShift cluster).
# Multi-DC is formed by deploying a ScyllaCluster on each cluster with
# the same clusterName and cross-referencing externalSeeds.
#
# Cluster 1 deploys this file with datacenter.name: dc1.
# Cluster 2 deploys a copy with datacenter.name: dc2 and
# externalSeeds pointing to Cluster 1's ScyllaDB nodes.
#
# Keyspace must use NetworkTopologyStrategy:
#   CREATE KEYSPACE soteria WITH replication = {
#     'class': 'NetworkTopologyStrategy', 'dc1': 2, 'dc2': 2
#   };
apiVersion: scylla.scylladb.com/v1
kind: ScyllaCluster
metadata:
  name: scylladb
  namespace: soteria
spec:
  version: "6.2.3"
  agentVersion: "3.3.3"
  developerMode: false
  # Multi-DC gossip uses metadata.name as the cluster identity.
  # Both clusters MUST use the same ScyllaCluster name.
  sysctls:
    - "fs.aio-max-nr=2097152"
  # externalSeeds must list at least one seed node from the OTHER DC.
  # Replace with actual IPs or DNS entries of the remote DC's ScyllaDB nodes.
  # externalSeeds:
  #   - "scylladb-dc2-node1.remote-cluster.example.com"
  datacenter:
    name: dc1
    racks:
      - name: rack1
        members: 2
        storage:
          capacity: 100Gi
          storageClassName: gp3-csi
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: topology.kubernetes.io/zone
                      operator: In
                      values:
                        - dc1-zone1
